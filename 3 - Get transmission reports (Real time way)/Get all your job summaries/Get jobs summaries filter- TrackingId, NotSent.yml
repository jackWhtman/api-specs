info:
  name: "Get jobs summaries filter: TrackingId, NotSent"
  type: http
  seq: 4

http:
  method: GET
  url: http://api.odyssey-services.fr/api/V1/JobSummaries?filterTid=API&filterOnlyNotSent=true
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
  params:
    - name: filterTid
      value: API
      type: query
    - name: filterOnlyNotSent
      value: "true"
      type: query
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
