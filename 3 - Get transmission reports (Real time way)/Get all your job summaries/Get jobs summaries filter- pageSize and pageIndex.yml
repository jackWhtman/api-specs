info:
  name: "Get jobs summaries filter: pageSize and pageIndex"
  type: http
  seq: 3

http:
  method: GET
  url: http://api.odyssey-services.fr/api/V1/JobSummaries?pageIndex=1&pageSize=5
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
  params:
    - name: pageIndex
      value: "1"
      type: query
    - name: pageSize
      value: "5"
      type: query
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
