info:
  name: Get jobs summaries without filters
  type: http
  seq: 2

http:
  method: GET
  url: http://api.odyssey-services.fr/api/V1/JobSummaries?pageSize=2
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
  params:
    - name: pageSize
      value: "2"
      type: query
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
