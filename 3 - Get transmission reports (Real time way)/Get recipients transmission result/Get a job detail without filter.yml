info:
  name: Get a job detail without filter
  type: http
  seq: 1

http:
  method: GET
  url: http://api.odyssey-services.fr/api/V1/JobItems?filterJob={{jobNumber}}
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
  params:
    - name: filterJob
      value: "{{jobNumber}}"
      type: query
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
