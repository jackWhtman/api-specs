info:
  name: Send basic voice message
  type: http
  seq: 1

http:
  method: POST
  url: https://api.odyssey-services.fr/api/V1/VoiceJobs
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
    - name: ""
      value: ""
  body:
    type: json
    data: "{\r

      \  \"JobType\": \"Vocal\",\r

      \  \"TrackingId\": \"Send Basic Voice message\",\r

      \  \"Documents\": [\r

      \    {\r

      \      \"Name\": \"Test.txt\",\r

      \      \"Type\":1,\r

      \      \"Content\": \"VGhpcyBpcyBhIHZvaWNlIG1lc3NhZ2U=\"\r

      \    }\r

      \  ],\r

      \  \"AdhocRecipients\": [\r

      \  {\r

      \      \"Name\": \"Dupont\",\r

      \      \"Address\": \"00336xxxxxx\"\r

      \    }\r

      \  ]\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        pm.setGlobalVariable(\"jobNumber\", jsonData.JobNumber);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
