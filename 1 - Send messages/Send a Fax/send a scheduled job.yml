info:
  name: send a scheduled job
  type: http
  seq: 4

http:
  method: POST
  url: https://api.odyssey-services.fr/api/V1/FaxJobs
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
    - name: ""
      value: ""
  body:
    type: json
    data: "{\r

      \  \"JobType\": \"NO_JTYPE\",\r

      \  \"TrackingId\": \"Send scheduled fax\",\r

      \  \"ScheduledStartTime\": \"2019-01-01T00:00:00.688Z\", \r

      \  \"Documents\": [\r

      \    {\r

      \      \"Name\": \"document.pdf\",\r

      \      \"Type\":1,\r

      \      \"Content\": \"Qm9uam91ciwgaWNpIEF1 .../...  uLCBjZWNpIGVzdCB1biB0ZXN0LiA=\"\r

      \    }\r

      \  ],  \r

      \  \"AdhocRecipients\": [\r

      \  {\r

      \      \"Name\": \"Dupont\",\r

      \      \"Address\": \"00334xxxxxx\"\r

      \    }\r

      \  ]\r

      }\r\n"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        pm.setGlobalVariable(\"jobNumber\", jsonData.JobNumber);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
