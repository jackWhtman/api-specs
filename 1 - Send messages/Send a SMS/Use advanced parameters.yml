info:
  name: Use advanced parameters
  type: http
  seq: 2

http:
  method: POST
  url: https://api.odyssey-services.fr/api/V1/SMSJobs
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
    - name: ""
      value: ""
  body:
    type: json
    data: "{\r

      \  \"JobType\": \"SMS\",\r

      \  \"TrackingId\": \"Send SMS with advanced parameters\",\r

      \  \"Text\": \"Hello World !\",\r

      \  \"Parameter\": {\r

      \    \"Sender\": \"My company\",\r

      \    \"ContentType\": 3,\r

      \    \"Media\": 1\r

      \  },\r

      \  \"AdhocRecipients\": [\r

      \    {\r

      \      \"Name\": \"Dupont\",\r

      \      \"Address\": \"00337xxxxxx\",\r

      \      \"OptionalFields\": [\r

      \        \"Company A\"\r

      \      ]\r

      \    }\r

      \  ]\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        pm.setGlobalVariable(\"jobNumber\", jsonData.JobNumber);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
