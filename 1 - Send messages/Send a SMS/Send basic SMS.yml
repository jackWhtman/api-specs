info:
  name: Send basic SMS
  type: http
  seq: 1

http:
  method: POST
  url: https://api.odyssey-services.fr/api/V1/SMSJobs
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
    - name: ""
      value: ""
  body:
    type: json
    data: "{\r

      \  \"JobType\": \"SMS\",\r

      \  \"Text\": \"Hello  World!\",  \r

      \  \"TrackingId\": \"Send Basic SMS\",\r

      \  \"AdhocRecipients\": [\r

      \  {\r

      \      \"Name\": \"Dupont\",\r

      \      \"Address\": \"00337xxxxxx\"\r

      \    }\r

      \  ]\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        pm.setGlobalVariable(\"jobNumber\", jsonData.JobNumber);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
