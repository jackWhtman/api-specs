info:
  name: "SMS Reception : filter page index and size, job"
  type: http
  seq: 2

http:
  method: GET
  url: http://api.odyssey-services.fr/api/V1/InboundSms?pageIndex=1&pageSize=5&filterJob={{jobNumber}}
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{Auth}}"
  params:
    - name: pageIndex
      value: "1"
      type: query
    - name: pageSize
      value: "5"
      type: query
    - name: filterJob
      value: "{{jobNumber}}"
      type: query
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
